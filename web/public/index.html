<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iris</title>
    <link rel="stylesheet" href="/style.css" />

    <!--
      Live2D Cubism Core runtime. Proprietary but free to use via the
      Live2D SDK terms — cannot be self-hosted, must be loaded from
      cubism.live2d.com.
    -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>

    <!--
      PIXI.js + pixi-live2d-display (UMD builds). We keep these as
      script tags rather than ESM imports because pixi-live2d-display
      mutates the global PIXI namespace at load time.
    -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
  </head>
  <body>
    <main>
      <div id="stage">
        <canvas id="avatar"></canvas>
        <video id="self-view" autoplay muted playsinline></video>
        <div id="face-debug">face: initializing…</div>
      </div>

      <section id="chat">
        <div id="transcript"></div>
        <form id="compose">
          <input
            id="input"
            type="text"
            placeholder="Type to Iris, or hold Space / mic to talk…"
            autocomplete="off"
          />
          <button id="mic" type="button" aria-label="hold to talk" title="Hold to talk">🎙️</button>
        </form>
        <div id="status">connecting…</div>
      </section>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
